<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">新規作成</a>
    </div>

    <div class="card border-0 shadow-sm bg-body-tertiary" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center p-5">
            <h2 class="h4 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">
                最初のタスクを登録して、作業を見える化しましょう。
            </p>
            <a th:href="@{/todo/new}" class="btn btn-primary btn-lg px-4">新規作成</a>
            <p class="small text-muted mt-3 mb-0">
                「新規作成」ボタンからToDoを追加できます。
            </p>
        </div>
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th scope="col" style="width: 80px;">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" style="width: 140px;">完了状態</th>
                    <th scope="col" style="width: 120px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">要件定義を作成する</td>
                    <td th:text="${todo.completed} == true ? '完了' : '未完了'">未完了</td>
                    <td>
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="mb-0">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
